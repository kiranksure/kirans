<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>


<body>

    <!-- Align below canvas to centre -->
    <!-- Add scroll for canvas -->
    <style>
        #myCanvas {
            overflow: scroll;
        }
    </style>
    <div style="text-align: center;">
        <button onclick="startGame()">Start Game</button>
        <button onclick="bid()">Bid</button>
        <p>Bid value <span id="bidvalue">14</span></p>
        <canvas height="600" width="900" id="myCanvas"></canvas>
    </div>



</body>
<script>




    // Get the canvas element

    const canvas = document.getElementById("myCanvas");
    const ctx = canvas.getContext("2d");
    // Get screen width and height
    const screenWidth = window.innerWidth;
    const screenHeight = window.innerHeight;
    canvas.width = screenWidth / 1.2
    canvas.height = screenHeight / 1.2

    //Params 

    //Card width and height
    const cardWidth = screenWidth / 20;
    const cardHeight = cardWidth * 3.5 / 2.25;
    const player1LeftMargin = screenWidth / 3.5;
    const player2LeftMargin = screenWidth / 3.5 + cardWidth * 6;
    const player3LeftMargin = screenWidth / 3.5;

    leftMargin = 10;
    topMargin = 10;


    drawGreenTable(ctx, screenWidth / 1.2, screenHeight / 1.2);

    function drawGreenTable(ctx, width, height) {
        // Set the fill color to green
        ctx.fillStyle = "green";

        // Draw the table as a rectangle with the specified width and height
        ctx.fillRect(0, 0, width, height);
    }

    // Function to draw dealt cards
    function drawCard(ctx, x, y, width, height, color, name, suit) {
        // Set the fill color to the specified color
        ctx.fillStyle = color;

        if (suit == '♠' || suit == '♣') {
            textColor = "black";
        } else {
            textColor = "red";
        }

        // Draw the card as a rectangle with the specified width and height
        ctx.roundRect(x, y, width, height, 4);
        // Add text to rectangle
        ctx.font = "30px Arial";
        ctx.fillStyle = textColor
        ctx.fillText(name, x + 10, y + 30);

        // Add suit to rectangle
        ctx.font = "30px Arial";
        ctx.fillStyle = textColor
        ctx.fillText(suit, x + 40, y + 30);
    }

    strDataURI = "https://freesvg.org/img/Prismatic-Floral-Design-12.png";
    //function to draw reverse card
    function drawReverseCard(ctx, x, y, width, height, color) {
        // Set the fill color to the specified color
        ctx.fillStyle = color;

        // Draw the card as a rectangle with the specified width and height
        ctx.fillRect(x, y, width, height);
        // Add text to rectangle

        var img = new Image;
        img.src = strDataURI;
        ctx.drawImage(img, x, y, width, height);
    }


    //Card array starting from 7 to A with suit and points where 7,8=0 9=2 ,J=3, Q=0,K=0,A=1
    const cardArray = [
        { name: 'J', suit: '♠', points: 3, rank: 1 },
        { name: 'J', suit: '♦', points: 3, rank: 1 },
        { name: 'J', suit: '♣', points: 3, rank: 1 },
        { name: 'J', suit: '♥', points: 3, rank: 1 },
        { name: '9', suit: '♠', points: 2, rank: 2 },
        { name: '9', suit: '♦', points: 2, rank: 2 },
        { name: '9', suit: '♣', points: 2, rank: 2 },
        { name: '9', suit: '♥', points: 2, rank: 2 },
        { name: 'A', suit: '♠', points: 1, rank: 3 },
        { name: 'A', suit: '♦', points: 1, rank: 3 },
        { name: 'A', suit: '♣', points: 1, rank: 3 },
        { name: 'A', suit: '♥', points: 1, rank: 3 },
        { name: '10', suit: '♠', points: 1, rank: 4 },
        { name: '10', suit: '♦', points: 1, rank: 4 },
        { name: '10', suit: '♣', points: 1, rank: 4 },
        { name: '10', suit: '♥', points: 1, rank: 4 },
        { name: 'K', suit: '♠', points: 0, rank: 5 },
        { name: 'K', suit: '♦', points: 0, rank: 5 },
        { name: 'K', suit: '♣', points: 0, rank: 5 },
        { name: 'K', suit: '♥', points: 0, rank: 5 },
        { name: 'Q', suit: '♠', points: 0, rank: 6 },
        { name: 'Q', suit: '♦', points: 0, rank: 6 },
        { name: 'Q', suit: '♣', points: 0, rank: 6 },
        { name: 'Q', suit: '♥', points: 0, rank: 6 },
        { name: '8', suit: '♠', points: 0, rank: 7 },
        { name: '8', suit: '♦', points: 0, rank: 7 },
        { name: '8', suit: '♣', points: 0, rank: 7 },
        { name: '8', suit: '♥', points: 0, rank: 7 },
        { name: '7', suit: '♠', points: 0, rank: 8 },
        { name: '7', suit: '♦', points: 0, rank: 8 },
        { name: '7', suit: '♣', points: 0, rank: 8 },
        { name: '7', suit: '♥', points: 0, rank: 8 },
    ];

    // Shuffle the cards
    function shuffleCards() {
        for (let i = cardArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * i);
            const temp = cardArray[i];
            cardArray[i] = cardArray[j];
            cardArray[j] = temp;
        }
    }

    // Deal only half the cards to four groups for each player
    function dealCards() {
        // Shuffle the cards
        shuffleCards();

        // Deal only half the cards to four groups for each player
        for (let i = 0; i < 4; i++) {
            for (let j = 0; j < 4; j++) {

                if (i == 0) {
                    drawReverseCard(ctx, j * 100 + player1LeftMargin + leftMargin, i * 100 + topMargin, cardWidth, cardHeight, "white", cardArray[i * 4 + j].name, cardArray[i * 4 + j].suit);
                }
                if (i == 1) {
                    drawReverseCard(ctx, j * 60 + player2LeftMargin + leftMargin, 350, cardWidth, cardHeight, "white", cardArray[i * 4 + j].name, cardArray[i * 4 + j].suit);
                }
                if (i == 2) {
                    drawCard(ctx, j * 100 + player3LeftMargin + leftMargin, i * 100 + 400, cardWidth, cardHeight, "white", cardArray[i * 4 + j].name, cardArray[i * 4 + j].suit);
                }
                if (i == 3) {
                    drawReverseCard(ctx, j * 80 + leftMargin, 350, cardWidth, cardHeight, "white", cardArray[i * 4 + j].name, cardArray[i * 4 + j].suit);
                }
            }
        }
    }




    // Call the function to deal the cards
    dealCards();





</script>

</html>
